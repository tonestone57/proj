# SGI Configuration Manifest (v1.0)
# Target Architecture: Intel Core i7-8265U (Whiskey Lake)
# Orchestration: Ray + IPEX-LLM

system_identity:
  name: "SGI-Alpha"
  mode: "Autonomous-Predictive-Workspace"

# SECTION 1: Hardware Resource Allocation (TDP: 15W)
hardware_limits:
  total_cpu_threads: 8
  ray_reserved_threads: 4           # Conserving for i7-8265U stability (Up to 4 cores)
  max_threads: 4                    # Scaled to 4 for requested performance
  thermal_threshold_celsius: 78.0   # Trigger "Cool-down" mode at 78C
  low_memory_warning_mb: 1200       # Ensuring Heartbeat stays in physical RAM (16GB system)
  shared_gpu_memory: true           # Enable optimizations for HD 620 iGPU

# SECTION 2: Specialized Actor Precision Tiers
actors:
  symbolic_reasoner:
    precision: "sym_int8"           # Fixed for AVX2 efficiency (No AVX-512)
    cpu_cores: 2
    priority: 1

  coding_actor:
    precision: "Q4_K_M"             # Base weights (2026 standard)
    cpu_cores: 2
    priority: 1

  search_actor:
    precision: "Q5_K_M"             # Web Data storage format
    cpu_cores: 1
    load_mode: "ipex_low_bit"
    priority: 3

# SECTION 3: Memory & Context Management
memory_management:
  active_context_limit: 32768       # Optimized for 16GB RAM
  pruning_threshold_pct: 0.80
  summarization_depth: "recursive"
  compression:
    vector_index: "sym_int8+BQ"     # 2026 Standard for AVX2
    kv_cache: "sym_int8"            # Fixed for 8265U (No FP8 support)
    reasoning_engine: "sym_int8"    # Fixed for AVX2 efficiency
    deep_archive: "LLM-Zip"         # Lossless Neural Archiving
    logs: "Zstd-19"                 # 2026 Standard for text logs
  vector_store:
    engine: "LanceDB"
    path: "./data/sgi_archived_memory"
    embedding_model: "nomic-embed-text-v1.5"
    reranker_model: "jina-reranker-v2"
    matryoshka_tiers: [128, 768]    # SGI 2026: Coarse-to-Fine tiers

# SECTION 4: Compliance & Drive Engine
compliance:
  prohibited_licenses: ["GPL", "LGPL", "AGPL"]
  verify_on_ingest: true

drive_engine:
  heartbeat_interval_seconds: 5
  entropy_threshold: 0.7
  threshold_replan: 2.0
  threshold_consolidate: 0.5
  active_inference_cycle_ticks: 5   # Interval for log-based self-patching

# SECTION 5: Reasoning & Inference Hybrid
inference:
  primary_model: "Apriel-1.6-15B-Thinker"
  draft_model: "Qwen3.5-2B"
  speculative_decoding: true
  wisdom_cache: true               # Enable Reasoning Trace archiving
