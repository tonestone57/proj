# SGI Configuration Manifest (v1.0)
# Target Architecture: Intel Core i5-8265U (Whiskey Lake)
# Orchestration: Ray + IPEX-LLM

system_identity:
  name: "SGI-Alpha"
  mode: "Autonomous-Predictive-Workspace"

# SECTION 1: Hardware Resource Allocation (TDP: 15W)
hardware_limits:
  total_cpu_threads: 8
  ray_reserved_threads: 4           # Conserving for i5-8265U stability
  max_threads: 4                    # 4-thread limit for SGI operations
  thermal_threshold_celsius: 78.0   # Trigger "Cool-down" mode at 78C
  low_memory_warning_mb: 800        # Pause ingestion if RAM < 800MB
  shared_gpu_memory: true           # Enable optimizations for HD 620 iGPU

# SECTION 2: Specialized Actor Precision Tiers
actors:
  symbolic_reasoner:
    precision: "fp16"               # Logic/Math (2026 standard)
    cpu_cores: 2
    priority: 1

  coding_actor:
    precision: "sym_int8"                # Base weights (2026 standard)
    cpu_cores: 2
    priority: 1

  search_actor:
    precision: "UD-Q4_K_M"                # Web Data
    cpu_cores: 1
    load_mode: "ipex_low_bit"
    priority: 3

# SECTION 3: Memory & Context Management
memory_management:
  active_context_limit: 2048
  pruning_threshold_pct: 0.80
  summarization_depth: "recursive"
  compression:
    vector_index: "Q8+BQ"           # 2026 Standard
    kv_cache: "FP8-E4M3"            # 2026 Standard
    reasoning_engine: "BF16"        # 2026 Standard
    deep_archive: "LLM-Zip"         # Lossless Neural Archiving
    logs: "Zstd-19"                 # 2026 Standard for text logs
  vector_store:
    engine: "LanceDB"
    path: "./data/sgi_archived_memory"
    embedding_model: "all-MiniLM-L6-v2"

# SECTION 4: Compliance & Drive Engine
compliance:
  prohibited_licenses: ["GPL", "LGPL", "AGPL"]
  verify_on_ingest: true

drive_engine:
  heartbeat_interval_seconds: 5
  entropy_threshold: 0.7
  threshold_replan: 2.0
  threshold_consolidate: 0.5
