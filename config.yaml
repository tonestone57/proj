# SGI Configuration Manifest (v1.0)
# Target Architecture: Intel Core i5-8265U (Whiskey Lake)
# Orchestration: Ray + IPEX-LLM
# Hardware Standards: 2026 SGI Operations

system_identity:
  name: "SGI-Alpha"
  mode: "Autonomous-Predictive-Workspace"

# SECTION 1: Hardware Resource Allocation (TDP: 15W)
hardware_limits:
  total_cpu_threads: 8
  ray_reserved_threads: 6           # Leave 2 threads for OS/UI stability
  thermal_threshold_celsius: 78.0   # Trigger "Cool-down" mode at 78C
  low_memory_warning_mb: 800        # Pause ingestion if RAM < 800MB
  shared_gpu_memory: true           # Enable optimizations for HD 620 iGPU
  cpu_cores_min: 2
  cpu_cores_max: 4
  max_threads: 4

# SECTION 2: Specialized Actor Precision Tiers (2026 Standards)
actors:
  symbolic_reasoner:
    precision: "bf16"               # Logic/Math (Q16)
    cpu_cores: 2
    priority: 1

  social_intent_agent:
    precision: "int8"               # General Discourse
    cpu_cores: 1
    priority: 2

  search_ingestion_spoke:
    precision: "nf4"                # Web Data / Base Weights
    cpu_cores: 1
    load_mode: "ipex_low_bit"
    priority: 3

  coding_actor:
    precision: "nf4"
    cpu_cores: 2
    priority: 1

  internal_critic:
    cpu_cores: 2

# SECTION 3: Memory & Context Management (Section 4)
memory_management:
  active_context_limit: 2048
  pruning_threshold_pct: 0.80       # Trigger at 1638 tokens
  summarization_depth: "recursive"  # Summarize older blocks before archiving
  vector_store:
    engine: "LanceDB"
    path: "./data/sgi_archived_memory"
    embedding_model: "all-MiniLM-L6-v2" # Optimized for CPU AVX2
    index_codec: "Q8+BQ"
    kv_cache_codec: "FP8_E4M3"

# SECTION 4: Compliance & Drive Engine (Section 5)
compliance:
  prohibited_licenses: ["GPL", "LGPL", "AGPL"]
  verify_on_ingest: true

drive_engine:
  heartbeat_interval_seconds: 5
  entropy_threshold: 0.7            # Above this, force re-planning/search
